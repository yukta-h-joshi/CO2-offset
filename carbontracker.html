<!doctype html>
<html lang="en">
<script src="https://cdn.tailwindcss.com"></script>
<head>
    <title>carbon tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">

<body>
    <h1>CARBON OFFSET TRACKER </h1>    
    <h3 style="color: blueviolet; font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif; font-size:small; padding: 0.5cm;">a tool to quantize the amount of effective for finding the amount of carbon calculated by a tree depending upon  its species</h3>
    <div style="border-top: 7px; border-top-style: double; border-top-color: rgb(114, 234, 136); padding: 1cm;"></div>
    <div class="container"> TREE </div>
    <div class="container";> SPACING
        <form class="calculator-form">
    <div class="species-selection">
        <span class="group-title">Select Tree Specie</span>
        <div class="radio-grid">
            <label class="tree-card">
                <input type="radio" name="tree_species" value="teak" checked>
                <div class="card-content">
                    <span class="tree-name">Teak (Sagwan)</span>
                </div>
            </label>
            <label class="tree-card">
                <input type="radio" name="tree_species" value="neem">
                <div class="card-content">
                    <span class="tree-name">Neem</span>
                </div>
            </label>
        </div>
    </div>
    </div>
    <div class="container">LAND AREA
        <input type="number"; padding>
        <input type="button" value="submit">
    </div>
